services:
  postgres:
    image: postgres:16-alpine
    container_name: gamblino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamblino
      POSTGRES_PASSWORD: gamblino
      POSTGRES_DB: gamblino
    ports:
      - "5432:5432"
    volumes:
      - gamblino_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamblino -d gamblino"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gamblino_pg:

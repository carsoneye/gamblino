name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gamblino
          POSTGRES_PASSWORD: gamblino
          POSTGRES_DB: gamblino
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gamblino"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://gamblino:gamblino@localhost:5432/gamblino
      AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      AUTH_URL: http://localhost:3000
      EMAIL_FROM: ci@gamblino.local
      EMAIL_SERVER_HOST: localhost
      EMAIL_SERVER_PORT: "1025"
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: ci
      LOG_LEVEL: warn
      FLAG_CRASH: "on"
      FLAG_MINES: "on"
      FLAG_PLINKO: "on"
      WS_PORT: "3001"
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install --frozen-lockfile

      - name: biome
        run: bun x biome check .

      - name: typecheck
        run: bun run typecheck

      - name: unit tests
        run: bun test

      - name: migrate
        if: hashFiles('drizzle.config.ts', 'drizzle.config.js', 'drizzle.config.mjs') != ''
        run: bun x drizzle-kit migrate

      - name: build
        run: bun run build

  e2e:
    name: playwright
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gamblino
          POSTGRES_PASSWORD: gamblino
          POSTGRES_DB: gamblino
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gamblino"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://gamblino:gamblino@localhost:5432/gamblino
      AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      AUTH_URL: http://localhost:3000
      EMAIL_FROM: ci@gamblino.local
      EMAIL_SERVER_HOST: localhost
      EMAIL_SERVER_PORT: "1025"
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: ci
      LOG_LEVEL: warn
      FLAG_CRASH: "on"
      FLAG_MINES: "on"
      FLAG_PLINKO: "on"
      WS_PORT: "3001"
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: detect playwright
        id: detect
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ] || [ -d tests/e2e ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: oven-sh/setup-bun@v2
        if: steps.detect.outputs.present == 'true'
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
        if: steps.detect.outputs.present == 'true'
      - name: migrate
        if: steps.detect.outputs.present == 'true'
        run: bun x drizzle-kit migrate
      - run: bun x playwright install --with-deps chromium
        if: steps.detect.outputs.present == 'true'
      - run: bun run e2e
        if: steps.detect.outputs.present == 'true'
        env:
          CI: "true"
      - uses: actions/upload-artifact@v4
        if: failure() && steps.detect.outputs.present == 'true'
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
